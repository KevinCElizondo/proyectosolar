version: '3.8'

services:
  # Frontend (React/Vite)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://backend-api:4000
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_PAYPAL_SANDBOX_CLIENT_ID=${VITE_PAYPAL_SANDBOX_CLIENT_ID}
      - VITE_PAYPAL_LIVE_CLIENT_ID=${VITE_PAYPAL_LIVE_CLIENT_ID}
      - VITE_CONVEX_DEPLOY_KEY=${VITE_CONVEX_DEPLOY_KEY}
      - VITE_N8N_WEBHOOK_URL=${VITE_N8N_WEBHOOK_URL}
      - VITE_ENABLE_ANALYTICS=${VITE_ENABLE_ANALYTICS}
      - VITE_ENABLE_NOTIFICATIONS=${VITE_ENABLE_NOTIFICATIONS}
    depends_on:
      - backend-api
    restart: unless-stopped

  # Backend API (Node.js/Express)
  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - FRONTEND_URL=http://frontend
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
      - PAYPAL_SECRET=${PAYPAL_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  # AI Agents (Python/FastAPI)
  ai-agents:
    build:
      context: ./ai_agents
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    volumes:
      - ai_agents_data:/app/data
    restart: unless-stopped

  # MCP Server (Python/FastMCP)
  mcp-server:
    build:
      context: ./src/integrations/mcp
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    volumes:
      - mcp_server_data:/app/data
    restart: unless-stopped

  # Support Dashboard
  support-dashboard:
    build:
      context: ./support-dashboard
      dockerfile: Dockerfile
    ports:
      - "9999:9999"
    environment:
      - PORT=9999
      - AI_AGENTS_URL=http://ai-agents:8000
    depends_on:
      - ai-agents
    restart: unless-stopped

  # N8N (Opcional - para automatizaciones)
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://host.docker.internal:5678/
      - GENERIC_TIMEZONE=America/Costa_Rica
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  backend_data:
  ai_agents_data:
  mcp_server_data:
  n8n_data:
